# =============================================================================
# mongod.conf — Hardened production configuration for LawyerUp backend
# SEC-01: Authentication enabled, localhost-only binding
# RO-01: WiredTiger cache tuned
# M-01:  Slow query profiling enabled
#
# Deploy: sudo cp config/mongod.conf /etc/mongod.conf && sudo systemctl restart mongod
# Adjust cacheSizeGB based on available server RAM (set to ~60-70% of RAM)
# =============================================================================

# ── Network ──────────────────────────────────────────────────────────────────
net:
  port: 27017
  bindIp: 127.0.0.1          # SEC-02: Localhost only — never 0.0.0.0 in production
                               # Use SSH tunnel or VPN for remote admin access

# ── Storage ───────────────────────────────────────────────────────────────────
storage:
  dbPath: /var/lib/mongodb
  journal:
    enabled: true
  wiredTiger:
    engineConfig:
      cacheSizeGB: 1.5        # RO-01: Set to ~60-70% of available RAM
                               # 2GB RAM  → 1.0 | 4GB RAM  → 2.5 | 8GB RAM → 5.0
      journalCompressor: snappy
    collectionConfig:
      blockCompressor: snappy  # Better compression for text-heavy law content
    indexConfig:
      prefixCompression: true  # Reduces index size on string-prefix fields

# ── Security ──────────────────────────────────────────────────────────────────
security:
  authorization: enabled      # SEC-01: Enforce authentication on all connections

# ── Operation Profiling ───────────────────────────────────────────────────────
operationProfiling:
  mode: slowOp                # M-01: Log operations slower than threshold
  slowOpThresholdMs: 100      # Flag anything over 100ms
  slowOpSampleRate: 1.0       # Log all slow ops (reduce to 0.1 under heavy load)

# ── System Log ────────────────────────────────────────────────────────────────
systemLog:
  destination: file
  path: /var/log/mongodb/mongod.log
  logAppend: true
  logRotate: rename
  verbosity: 0                # Increase to 1-5 for debugging only

# ── Process Management ────────────────────────────────────────────────────────
processManagement:
  timeZoneInfo: /usr/share/zoneinfo
  fork: false                 # Let systemd manage the process

# ── Replication (uncomment when setting up replica set — SC-01) ───────────────
# replication:
#   replSetName: "rs0"
#   oplogSizeMB: 1024
